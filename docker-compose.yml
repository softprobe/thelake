networks:
  backend_net:
    driver: bridge

services:
  ducklake-postgres:
    image: postgres:17
    container_name: ducklake-postgres
    environment:
      - POSTGRES_PASSWORD=ducklake
      - POSTGRES_USER=ducklake
      - POSTGRES_DB=ducklake
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ducklake -p 5432 -d ducklake"]
      interval: 2s
      timeout: 10s
      retries: 10
      start_period: 10s
    networks:
      - backend_net
    volumes:
      - ducklake-postgres-data:/var/lib/postgresql/data

  minio:
    image: minio/minio:latest
    container_name: minio
    ports:
      - "9000:9000"   # API
      - "9001:9001"   # Console
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
      - MINIO_DOMAIN=minio
    command: server /data --console-address ":9001"
    volumes:
      - ./warehouse/minio:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      backend_net:
        aliases:
          - warehouse.minio


  db:
    image: postgres:17
    container_name: lakekeeper-db
    environment:
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_USER=postgres
      - POSTGRES_DB=postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -p 5432 -d postgres"]
      interval: 2s
      timeout: 10s
      retries: 10
      start_period: 10s
    networks:
      - backend_net
    volumes:
      - lakekeeper-postgres:/var/lib/postgresql/data


  migrate:
    image: ${LAKEKEEPER_IMAGE:-vakamo/lakekeeper:latest}
    container_name: lakekeeper-migrate
    environment:
      - LAKEKEEPER__PG_ENCRYPTION_KEY=This-is-NOT-Secure!
      - LAKEKEEPER__PG_DATABASE_URL_READ=postgresql://postgres:postgres@db:5432/postgres
      - LAKEKEEPER__PG_DATABASE_URL_WRITE=postgresql://postgres:postgres@db:5432/postgres
      - RUST_LOG=info
    command: ["migrate"]
    depends_on:
      db:
        condition: service_healthy
    networks:
      - backend_net


  lakekeeper:
    image: ${LAKEKEEPER_IMAGE:-vakamo/lakekeeper:latest}
    container_name: lakekeeper
    ports:
      - "8181:8181"
    environment:
      - LAKEKEEPER__PG_ENCRYPTION_KEY=This-is-NOT-Secure!
      - LAKEKEEPER__PG_DATABASE_URL_READ=postgresql://postgres:postgres@db:5432/postgres
      - LAKEKEEPER__PG_DATABASE_URL_WRITE=postgresql://postgres:postgres@db:5432/postgres
      - RUST_LOG=info
    command: ["serve"]
    depends_on:
      minio:
        condition: service_healthy
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    networks:
      - backend_net
    healthcheck:
      test: ["CMD", "/home/nonroot/lakekeeper", "healthcheck"]
      interval: 5s
      timeout: 10s
      retries: 10
      start_period: 5s


  # etl-worker: REMOVED - No longer using ClickHouse ETL
  # Direct Iceberg queries via otlp-backend are sufficient
  # See docs/design.md for architecture details

  otlp-backend:
    build: .
    container_name: otlp-backend
    depends_on:
      lakekeeper:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      - RUST_LOG=info
      - AWS_REGION=us-east-1
      - AWS_ACCESS_KEY_ID=minioadmin
      - AWS_SECRET_ACCESS_KEY=minioadmin
    volumes:
      - ./tests/config/test-docker.yaml:/app/config.yaml:ro
    networks:
      - backend_net
    ports:
      - "4317:4317"  # OTLP gRPC


  grafana:
    image: grafana/grafana:10.4.0-ubuntu  # Ubuntu-based for glibc/libstdc++ compatibility
    platform: linux/amd64  # Force x86_64 for DuckDB plugin compatibility
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_PLUGINS_ALLOW_LOADING_UNSIGNED_PLUGINS=motherduck-duckdb-datasource
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/plugins:/var/lib/grafana/plugins
      - grafana-storage:/var/lib/grafana
    depends_on:
      minio:
        condition: service_healthy
    networks:
      - backend_net

volumes:
  grafana-storage:
  lakekeeper-postgres:
  ducklake-postgres-data:
