server:
  port: 8090
  host: "0.0.0.0"
  max_body_size: 104857600  # 100MB
  worker_threads: null

storage:
  s3_region: "us-east-1"

# Span buffering configuration
span_buffering:
  max_buffer_bytes: 134217728  # 128MB
  max_buffer_spans: 10000
  flush_interval_seconds: 60

ingest_engine:
  cache_dir: "/tmp/ingest-cache"

compaction:
  enabled: true
  min_files_to_compact: 5
  target_file_size_bytes: 67108864  # 64MB
  compaction_interval_seconds: 3600  # 1 hour

duckdb:
  max_connections: 10
  max_memory_per_query: "2GB"
  max_query_duration_seconds: 30
  enable_spill_to_disk: true
  spill_directory: "/tmp/duckdb_spill"

s3:
  endpoint: "http://localhost:9000"  # Local MinIO endpoint
  access_key_id: "minioadmin"
  secret_access_key: "minioadmin"

ducklake:
  catalog_type: "postgres"
  metadata_path: "host=localhost port=5432 dbname=ducklake user=ducklake password=ducklake"
  data_path: "./warehouse/ducklake/data/"
  catalog_alias: "softprobe"
  metadata_schema: "softprobe"
  data_inlining_row_limit: 10000

# UI dropdown EAV (Postgres); requires ducklake.catalog_type=postgres
dropdown_catalog:
  enabled: false
  active_values_days: 7
  maintenance_prune_enabled: true
  # Pairs per INSERT (reduces round-trips vs one row per execute). Clamped 1..=5000 in code.
  upsert_batch_size: 500
