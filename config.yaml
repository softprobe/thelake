server:
  port: 8090
  host: "0.0.0.0"
  max_body_size: 104857600  # 100MB
  worker_threads: null

storage:
  s3_region: "us-east-1"

# Span buffering configuration
span_buffering:
  max_buffer_bytes: 134217728  # 128MB
  max_buffer_spans: 10000
  flush_interval_seconds: 60

ingest_engine:
  wal_bucket: "warehouse"
  wal_prefix: "wal"
  cache_dir: "/tmp/ingest-cache"
  wal_dir: "/tmp/ingest-wal"
  optimizer_interval_seconds: 300
  replay_wal_on_startup: false

compaction:
  enabled: true
  min_files_to_compact: 5
  target_file_size_bytes: 67108864  # 64MB
  compaction_interval_seconds: 3600  # 1 hour

duckdb:
  max_connections: 10
  max_memory_per_query: "2GB"
  max_query_duration_seconds: 30
  enable_spill_to_disk: true
  spill_directory: "/tmp/duckdb_spill"

s3:
  endpoint: "http://localhost:9000"  # Local MinIO endpoint
  access_key_id: "minioadmin"
  secret_access_key: "minioadmin"

iceberg:
  catalog_type: "rest"
  catalog_uri: "http://localhost:8181/catalog"
  warehouse: "default"
  write_target_file_size_bytes: 67108864  # 64MB
  write_row_group_size_bytes: 134217728  # 128MB
  write_page_size_bytes: 1048576  # 1MB
  force_close_after_append: false
