server:
  port: 8090
  host: "0.0.0.0"
  max_body_size: 104857600
  worker_threads: null

storage:
  s3_region: "us-east-1"

span_buffering:
  max_buffer_bytes: 134217728
  max_buffer_spans: 1
  flush_interval_seconds: 1

ingest_engine:
  cache_dir: "/tmp/ingest-cache"

compaction:
  enabled: false
  min_files_to_compact: 5
  target_file_size_bytes: 67108864
  compaction_interval_seconds: 3600

duckdb:
  max_connections: 10
  max_memory_per_query: "1GB"
  max_query_duration_seconds: 30
  enable_spill_to_disk: true
  spill_directory: "/tmp/duckdb_spill"

s3:
  endpoint: "http://host.docker.internal:9000"
  access_key_id: "minioadmin"
  secret_access_key: "minioadmin"

ducklake:
  catalog_type: "postgres"
  metadata_path: "host=ducklake-postgres port=5432 dbname=ducklake user=ducklake password=ducklake"
  data_path: "s3://warehouse/ducklake/data/"
  catalog_alias: "softprobe"
  metadata_schema: "softprobe"
  data_inlining_row_limit: 10000
