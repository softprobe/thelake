# AWS Benchmark Configuration
# This file is auto-generated by aws_benchmark.sh setup command
# For manual configuration, update values below
#
# Usage:
#   CONFIG_FILE=config-aws-benchmark.yaml cargo run --bin perf_stress -- [args]

server:
  port: 8090
  host: "0.0.0.0"
  max_body_size: 104857600  # 100MB
  worker_threads: null

storage:
  s3_region: "us-east-1"  # AWS region (us-east-1, us-west-2, etc.)

span_buffering:
  max_buffer_bytes: 134217728  # 128MB
  max_buffer_spans: 10000
  flush_interval_seconds: 60

ingest_engine:
  enabled: true
  wal_bucket: "YOUR-S3-BUCKET-NAME"  # Update with your S3 bucket name
  wal_prefix: "wal"
  cache_dir: "/var/tmp/datalake/cache"  # Server-local cache directory
  optimizer_interval_seconds: 300
  replay_wal_on_startup: false

compaction:
  enabled: true
  min_files_to_compact: 5
  target_file_size_bytes: 67108864  # 64MB
  compaction_interval_seconds: 3600  # 1 hour

duckdb:
  max_connections: 4  # Reduced to prevent OOM on c5.2xlarge (16GB RAM)
  max_memory_per_query: "1GB"  # Reduced to fit within instance memory
  max_query_duration_seconds: 60  # Longer timeout for complex queries
  enable_spill_to_disk: true
  spill_directory: "/var/tmp/datalake/duckdb_spill"

# AWS S3 Configuration
# When endpoint is null, uses default AWS S3 endpoint
# Credentials are provided via IAM role (no keys needed)
s3:
  endpoint: null  # null = use default AWS S3 endpoint
  access_key_id: null  # Not needed when using IAM role
  secret_access_key: null  # Not needed when using IAM role

iceberg:
  catalog_type: "rest"  # REST catalog (Lakekeeper)
  catalog_uri: "http://CATALOG-IP:8181/catalog"  # Update with REST catalog IP
  catalog_token: null  # Set if catalog requires authentication
  warehouse: "s3://YOUR-S3-BUCKET-NAME/warehouse"  # Update with your S3 bucket path
  write_target_file_size_bytes: 134217728  # 128MB for production
  write_row_group_size_bytes: 134217728  # 128MB
  write_page_size_bytes: 1048576  # 1MB
  force_close_after_append: false
